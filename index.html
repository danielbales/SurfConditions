<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a1628">
  <meta name="description" content="Real-time surf conditions for your local spots">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Surf">
  <title>DB's Local</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="header-left">
    <h1>🌊 DB's Local</h1>
    <div class="subtitle" id="location-subtitle"></div>
  </div>
  <div class="header-right">
    <button class="map-open-btn" onclick="openMapView()" title="Wave Map">🗺</button>
    <button class="refresh-btn" id="refreshBtn" onclick="refreshAll()">
      <span class="icon">↻</span> Refresh
    </button>
  </div>
</header>

<div class="location-selector" id="location-selector"></div>

<div class="last-updated" id="lastUpdated">Loading…</div>

<main>

  <!-- Wave Observations (Open-Meteo Marine current) -->
  <div class="card" id="card-buoy">
    <div class="card-header">
      <div class="card-title"><span class="icon">📡</span> Wave Observations</div>
      <div class="card-badge" id="buoy-badge" style="background:rgba(0,212,170,0.15);color:#00d4aa">MODEL</div>
    </div>
    <div class="card-body" id="buoy-body">
      <div class="loading"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>
    </div>
  </div>

  <!-- Swell Forecast -->
  <div class="card" id="card-swell">
    <div class="card-header">
      <div class="card-title"><span class="icon">🌊</span> Swell Forecast</div>
      <div class="card-badge" style="background:rgba(30,144,255,0.15);color:#1e90ff">OPEN-METEO</div>
    </div>
    <div class="card-body" id="swell-body">
      <div class="loading"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>
    </div>
  </div>

  <!-- Wind -->
  <div class="card" id="card-wind">
    <div class="card-header">
      <div class="card-title"><span class="icon">💨</span> Wind</div>
      <div class="card-badge" id="wind-badge" style="background:rgba(0,200,83,0.15);color:#00c853">CALM</div>
    </div>
    <div class="card-body" id="wind-body">
      <div class="loading"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>
    </div>
  </div>

  <!-- Wind Forecast -->
  <div class="card" id="card-wind-forecast">
    <div class="card-header">
      <div class="card-title"><span class="icon">📈</span> Wind Forecast</div>
      <div class="card-badge" style="background:rgba(0,200,83,0.15);color:#00c853">48H</div>
    </div>
    <div class="card-body" id="wind-forecast-body">
      <div class="loading"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>
    </div>
  </div>

  <!-- Tides (US only — hidden until US spot loaded) -->
  <div class="card" id="card-tides" style="display:none">
    <div class="card-header">
      <div class="card-title"><span class="icon">🌊</span> Tides</div>
      <div class="card-badge" style="background:rgba(155,109,255,0.15);color:#9b6dff">NOAA</div>
    </div>
    <div class="card-body" id="tides-body">
      <div class="loading"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>
    </div>
  </div>

  <!-- Marine Forecast (US only) -->
  <div class="card" id="card-marine" style="display:none">
    <div class="card-header">
      <div class="card-title"><span class="icon">⚓</span> Marine Forecast</div>
      <div class="card-badge" style="background:rgba(30,144,255,0.15);color:#1e90ff">NWS</div>
    </div>
    <div class="card-body" id="marine-body">
      <div class="loading"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>
    </div>
  </div>

  <!-- Rip Current (US only) -->
  <div class="card" id="card-rip" style="display:none">
    <div class="card-header">
      <div class="card-title"><span class="icon">⚠️</span> Rip Current Risk</div>
      <div class="card-badge" id="rip-badge" style="background:rgba(0,200,83,0.15);color:#00c853">LOW</div>
    </div>
    <div class="card-body" id="rip-body">
      <div class="loading"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>
    </div>
  </div>

</main>

<!-- Onboarding / Spot Editor Overlay -->
<div id="onboarding" class="onboarding-overlay">
  <div class="onboarding-inner">
    <div class="onboarding-logo">🌊</div>
    <div class="onboarding-title" id="onboarding-title">DB's Local</div>
    <div class="onboarding-sub" id="onboarding-sub">Add up to 4 of your local surf spots</div>

    <div class="search-wrap">
      <input type="search" id="spot-search" class="spot-search-input"
             placeholder="Search a beach or location…"
             autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
             oninput="onSearchInput(this.value)">
    </div>

    <div id="search-status" class="search-status"></div>
    <div id="search-results" class="search-results"></div>

    <div id="added-spots-section" style="display:none">
      <div class="added-label">Your Spots</div>
      <div id="added-spots-list" class="added-spots-list"></div>
    </div>

    <button class="onboarding-btn" id="start-btn" onclick="finishOnboarding()" disabled>
      Start Surfing →
    </button>
  </div>
</div>

<!-- ── Map View Overlay (Windy-style) ──────────────────────────────────────── -->
<div id="map-view">

  <!-- Floating header bar -->
  <div class="map-hdr">
    <button class="map-back-btn" onclick="closeMapView()">←</button>
    <span class="map-hdr-title">Wave Map</span>
    <div class="map-layer-toggle">
      <button id="map-btn-wind"  class="map-layer-btn active" onclick="switchMapLayer('wind')">Wind</button>
      <button id="map-btn-swell" class="map-layer-btn"        onclick="switchMapLayer('swell')">Swell</button>
    </div>
    <span id="map-loading">Loading…</span>
  </div>

  <!-- Leaflet renders here -->
  <div id="leaflet-map"></div>

  <!-- Spot info bottom sheet (tap on marker) -->
  <div id="map-spot-panel" class="map-spot-panel"></div>

  <!-- Time scrubber -->
  <div class="map-slider-bar">
    <div class="map-slider-row">
      <span id="map-time-label" class="map-time-lbl">Now</span>
      <input type="range" id="map-time-slider" class="map-slider"
             min="0" max="8" value="0" step="1"
             oninput="updateMapForStep(+this.value)">
      <span class="map-time-end">+24h</span>
    </div>
    <div class="map-tick-row">
      <span>Now</span><span>+6h</span><span>+12h</span><span>+18h</span><span>+24h</span>
    </div>
  </div>

</div>

<script src="app.js"></script>
<script src="map.js"></script>
</body>
</html>
